<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>Hirely</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { margin: 0; padding: 0; color: #0F172A; background: #fff; }

    .header {
      background: linear-gradient(135deg, #2563EB, #1E3A5F);
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 28px; height: 28px; background: #fff; color: #2563EB;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; flex-shrink: 0;
    }
    .header-title { font-weight: 700; font-size: 15px; }

    .body { padding: 18px; }

    .profile-row { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
    .avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%; background: #2563EB; color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0;
    }
    .profile-name { font-size: 14.5px; font-weight: 700; color: #0F172A; }
    .profile-sub { font-size: 11.5px; color: #64748B; margin-top: 2px; }

    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .field input, .field textarea {
      width: 100%; padding: 9px 11px; border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-size: 13.5px; color: #0F172A; outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: #2563EB; }
    .field input[readonly] { background: #F8FAFC; color: #64748B; }

    .row-2 { display: flex; gap: 10px; }
    .row-2 .field { flex: 1; }

    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: #2563EB; color: #fff; font-weight: 700; font-size: 13.5px;
      cursor: pointer; transition: background 0.15s ease;
    }
    .btn:hover { background: #1D4ED8; }
    .btn:disabled { background: #94A3B8; cursor: not-allowed; }
    .btn-secondary {
      width: 100%; padding: 11px; border: 1.5px solid #E2E8F0; border-radius: 9px;
      background: #fff; color: #334155; font-weight: 600; font-size: 13.5px; cursor: pointer; margin-top: 8px;
    }
    .btn-secondary:hover { background: #F8FAFC; }

    .status { font-size: 12.5px; margin-top: 12px; padding: 9px 11px; border-radius: 8px; display: none; }
    .status.show { display: block; }
    .status.success { background: #ECFDF5; color: #047857; }
    .status.error { background: #FEF2F2; color: #B91C1C; }
    .status.info { background: #EFF6FF; color: #1D4ED8; }

    .login-hint { font-size: 12.5px; color: #64748B; margin-bottom: 16px; line-height: 1.5; }
    .link { color: #2563EB; text-decoration: none; font-weight: 600; }
    .footer-note { font-size: 11px; color: #94A3B8; text-align: center; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">H</div>
    <div class="header-title">Save to Hirely</div>
  </div>
  <div class="body" id="app">
    <p class="login-hint">Loading...</p>
  </div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────
    // Same anon key as the Chrome extension / web app — paste it in below.
    const HIRELY_CONFIG = {
      SUPABASE_URL: "https://rjxlnutucxxefgqtohnc.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqeGxudXR1Y3h4ZWZncXRvaG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzIyNDMsImV4cCI6MjA5ODQ0ODI0M30.8GmNv0CjniF32bqKR335U8zBavnLDGN_ryodyT1RWJw"
    };

    const STORAGE_KEY = "hirely_outlook_session";
    const app = document.getElementById("app");

    // ── SESSION HELPERS ──────────────────────────────────────────────────
    function getSession() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }
    function setSession(session) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
    }
    function clearSession() {
      localStorage.removeItem(STORAGE_KEY);
    }

    async function login(email, password) {
      const res = await fetch(`${HIRELY_CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: HIRELY_CONFIG.SUPABASE_ANON_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error_description || data.msg || data.message || "Login failed. Check your email and password.");
      }
      const session = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Date.now() + data.expires_in * 1000,
        user: data.user
      };
      setSession(session);
      return session;
    }

    async function refreshIfNeeded(session) {
      if (!session) return null;
      if (Date.now() < session.expires_at - 60000) return session;
      const res = await fetch(`${HIRELY_CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: { apikey: HIRELY_CONFIG.SUPABASE_ANON_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: session.refresh_token })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { clearSession(); return null; }
      const newSession = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Date.now() + data.expires_in * 1000,
        user: data.user || session.user
      };
      setSession(newSession);
      return newSession;
    }

    function pickColor(seed) {
      const colors = ["#2563EB", "#7C3AED", "#DB2777", "#EA580C", "#059669", "#0891B2"];
      let h = 0;
      for (const c of seed || "") h += c.charCodeAt(0);
      return colors[h % colors.length];
    }

    async function findExisting(session, email) {
      const res = await fetch(
        `${HIRELY_CONFIG.SUPABASE_URL}/rest/v1/contacts?select=id,first_name,last_name&user_id=eq.${session.user.id}&email=eq.${encodeURIComponent(email)}`,
        { headers: { apikey: HIRELY_CONFIG.SUPABASE_ANON_KEY, Authorization: `Bearer ${session.access_token}` } }
      );
      if (!res.ok) return null;
      const data = await res.json().catch(() => []);
      return Array.isArray(data) && data.length > 0 ? data[0] : null;
    }

    async function saveContact(payload) {
      let session = await refreshIfNeeded(getSession());
      if (!session) throw new Error("NOT_LOGGED_IN");

      if (payload.email) {
        const existing = await findExisting(session, payload.email);
        if (existing) {
          const err = new Error("ALREADY_EXISTS");
          err.contact = existing;
          throw err;
        }
      }

      const body = {
        user_id: session.user.id,
        first_name: payload.firstName,
        last_name: payload.lastName,
        email: payload.email || null,
        phone: null,
        company: payload.company || null,
        job_title: payload.jobTitle || null,
        linkedin_url: null,
        avatar_color: pickColor(payload.firstName),
        status: "active",
        column_name: "upcoming",
        status_label: "New",
        sent_date: null,
        original_email: payload.originalEmail || null,
        enriched: false,
        notes: "",
        activity: [{ type: "created", source: "Outlook Add-in", date: new Date().toISOString() }]
      };

      const res = await fetch(`${HIRELY_CONFIG.SUPABASE_URL}/rest/v1/contacts`, {
        method: "POST",
        headers: {
          apikey: HIRELY_CONFIG.SUPABASE_ANON_KEY,
          Authorization: `Bearer ${session.access_token}`,
          "Content-Type": "application/json",
          Prefer: "return=representation"
        },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || "Failed to save contact to Hirely.");
      return Array.isArray(data) ? data[0] : data;
    }

    // ── EMAIL DATA ───────────────────────────────────────────────────────
    function getEmailData() {
      return new Promise((resolve) => {
        const item = Office.context.mailbox.item;
        const from = item.from || item.sender || {};
        const myEmail = (Office.context.mailbox.userProfile.emailAddress || "").toLowerCase();
        const isSentByMe = (from.emailAddress || "").toLowerCase() === myEmail;

        // Viewing an email you sent — the person to save is the recipient,
        // not yourself. Viewing a received email — it's the sender, as before.
        let contactSource;
        if (isSentByMe && item.to && item.to.length) {
          contactSource = item.to[0];
        } else {
          contactSource = from;
        }

        const displayName = (contactSource.displayName || "").trim();
        const emailAddress = (contactSource.emailAddress || "").trim();
        const parts = displayName.split(" ").filter(Boolean);
        const firstName = parts[0] || emailAddress.split("@")[0] || "";
        const lastName = parts.slice(1).join(" ") || "";

        item.body.getAsync(Office.CoercionType.Text, (result) => {
          let bodyText = "";
          if (result.status === Office.AsyncResultStatus.Succeeded) {
            bodyText = (result.value || "").trim().slice(0, 2000);
          }
          resolve({
            firstName,
            lastName,
            email: emailAddress,
            subject: item.subject || "",
            originalEmail: bodyText,
            isSentByMe
          });
        });
      });
    }

    // ── RENDER ───────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return (str || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function escapeAttr(str) { return escapeHtml(str); }

    function showStatus(el, msg, kind) {
      el.textContent = msg;
      el.className = `status show ${kind}`;
    }

    async function render() {
      const session = await refreshIfNeeded(getSession());
      if (!session) {
        renderLogin();
      } else {
        await renderContact(session);
      }
    }

    function renderLogin() {
      app.innerHTML = `
        <p class="login-hint">Log in with your Hirely account to save this sender directly to your pipeline.</p>
        <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@company.com" /></div>
        <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" /></div>
        <button class="btn" id="login-btn">Log In</button>
        <div class="status" id="login-status"></div>
        <p class="footer-note">Don't have an account? <a class="link" href="https://app.hirelypro.com/signup" target="_blank">Sign up</a></p>
      `;
      document.getElementById("login-btn").addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const statusEl = document.getElementById("login-status");
        const btn = document.getElementById("login-btn");
        if (!email || !password) { showStatus(statusEl, "Enter your email and password.", "error"); return; }
        btn.disabled = true;
        btn.textContent = "Logging in…";
        try {
          await login(email, password);
          render();
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Log In";
          showStatus(statusEl, e.message || "Login failed.", "error");
        }
      });
    }

    async function renderContact(session) {
      app.innerHTML = `<p class="login-hint">Reading this email…</p>`;
      const data = await getEmailData();
      const initials = ((data.firstName[0] || "") + (data.lastName[0] || "")).toUpperCase();

      app.innerHTML = `
        <div class="profile-row">
          <div class="avatar-fallback">${initials || "?"}</div>
          <div>
            <div class="profile-name">${escapeHtml(data.firstName + " " + data.lastName) || "Unknown sender"}</div>
            <div class="profile-sub">${data.isSentByMe ? "Recipient of this email" : "Sender of this email"} · ${escapeHtml(session.user.email)}</div>
          </div>
        </div>

        <div class="row-2">
          <div class="field"><label>First name</label><input id="f-first" value="${escapeAttr(data.firstName)}" /></div>
          <div class="field"><label>Last name</label><input id="f-last" value="${escapeAttr(data.lastName)}" /></div>
        </div>
        <div class="field"><label>Email</label><input id="f-email" value="${escapeAttr(data.email)}" /></div>
        <div class="field"><label>Company</label><input id="f-company" placeholder="Not captured from email — add manually" /></div>
        <div class="field"><label>Job title</label><input id="f-title" placeholder="Not captured from email — add manually" /></div>

        <button class="btn" id="save-btn">Save to Hirely</button>
        <button class="btn-secondary" id="logout-btn">Log out</button>
        <div class="status" id="save-status"></div>
        <p class="footer-note">Company/title aren't in the email — add them here, or fill in later from the dashboard.</p>
      `;

      document.getElementById("logout-btn").addEventListener("click", () => {
        clearSession();
        render();
      });

      document.getElementById("save-btn").addEventListener("click", async () => {
        const statusEl = document.getElementById("save-status");
        const btn = document.getElementById("save-btn");
        const payload = {
          firstName: document.getElementById("f-first").value.trim(),
          lastName: document.getElementById("f-last").value.trim(),
          email: document.getElementById("f-email").value.trim(),
          company: document.getElementById("f-company").value.trim(),
          jobTitle: document.getElementById("f-title").value.trim(),
          originalEmail: data.originalEmail
        };
        if (!payload.firstName) { showStatus(statusEl, "First name is required.", "error"); return; }

        btn.disabled = true;
        btn.textContent = "Saving…";
        try {
          await saveContact(payload);
          showStatus(statusEl, "✓ Saved to Hirely.", "success");
          btn.textContent = "Saved ✓";
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Save to Hirely";
          if (e.message === "ALREADY_EXISTS") {
            showStatus(statusEl, "This contact is already in Hirely.", "info");
          } else if (e.message === "NOT_LOGGED_IN") {
            renderLogin();
          } else {
            showStatus(statusEl, e.message || "Something went wrong. Try again.", "error");
          }
        }
      });
    }

    Office.onReady(() => {
      render();
    });
  </script>
</body>
</html>
